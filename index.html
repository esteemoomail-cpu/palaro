<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>PISO PALARO</title>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800;900&family=JetBrains+Mono:wght@400;600;700&display=swap" rel="stylesheet">
<style>
/* ── CSS REMAINS THE SAME (Keeping styles consistent) ── */
*{margin:0;padding:0;box-sizing:border-box}
:root{--bg:#060919;--card:rgba(12,17,50,.92);--card2:rgba(20,26,60,.85);--gold:#ffd700;--goldd:#c9a200;--txt:#eef;--sub:#6a73a0;--bdr:rgba(255,215,0,.1);--ok:#00e676;--gc:#007aff;--err:#ff3b3b;--warn:#ff9100;--pend:#ffab00;--r:12px}
html{scroll-behavior:smooth}body{font-family:'Inter',system-ui,sans-serif;background:var(--bg);color:var(--txt);min-height:100vh;overflow-x:hidden}
.logo-img-wrap{display:none;justify-content:center;align-items:center;margin-bottom:6px}
.logo-img-wrap img{max-height:clamp(60px,15vw,120px);width:auto;object-fit:contain;filter:drop-shadow(0 4px 24px rgba(255,215,0,.18))}
.logo-img-wrap.on{display:flex}
.logo{font-size:clamp(2rem,7vw,3.3rem);font-weight:900;background:linear-gradient(135deg,var(--goldd),var(--gold),#fff8c4,var(--gold));-webkit-background-clip:text;-webkit-text-fill-color:transparent;letter-spacing:4px}
.logo span{display:block;font-size:.38em;letter-spacing:12px;font-weight:300;-webkit-text-fill-color:var(--sub)}
.pill{display:inline-block;margin-top:12px;padding:7px 24px;background:linear-gradient(135deg,var(--goldd),var(--gold));color:#000;border-radius:50px;font-weight:800;font-size:.95rem}
.conn{text-align:center;padding:10px;margin-top:20px;border-radius:10px;font-size:.8rem;font-weight:600}
.checking{background:rgba(255,255,255,.05);color:var(--sub);animation:pulse 1s infinite}.online{color:var(--ok)}.offline{color:var(--err)}
.card{background:var(--card);border:1px solid var(--bdr);border-radius:16px;padding:24px;margin-bottom:22px}
.w{max-width:860px;margin:0 auto;padding:14px}
.steps{display:flex;justify-content:center;align-items:center;margin-bottom:22px}
.stp{padding:7px 12px;font-size:.75rem;font-weight:600;color:var(--sub);transition:.3s}.stp.on{color:var(--gold)}.stp.ok{color:var(--ok)}
.sln{width:28px;height:2px;background:rgba(255,255,255,.07);transition:.3s}.sln.on{background:var(--gold)}
.fg{margin-bottom:14px}.fg label{display:block;font-size:.7rem;font-weight:600;color:var(--sub);margin-bottom:5px;text-transform:uppercase;letter-spacing:2px}
.fg input,.fg select{width:100%;padding:12px 13px;background:rgba(255,255,255,.05);border:1px solid rgba(255,255,255,.1);border-radius:10px;color:#fff;font-size:1rem;outline:none}
.fg input:focus{border-color:var(--gold)}
.btn{width:100%;padding:13px;border:none;border-radius:var(--r);font-size:.9rem;font-weight:700;cursor:pointer}
.b1{background:linear-gradient(135deg,var(--goldd),var(--gold));color:#000}
.b1:hover:not(:disabled){transform:translateY(-2px)}
.b2{background:rgba(255,255,255,.06);color:#fff;border:1px solid rgba(255,255,255,.1);margin-top:10px}
.tot{background:linear-gradient(135deg,rgba(255,215,0,.08),rgba(255,215,0,.02));border:1px dashed rgba(255,215,0,.2);border-radius:var(--r);padding:14px;text-align:center;margin:14px 0}
.tl{font-size:.66rem;color:var(--sub);text-transform:uppercase;letter-spacing:2px;margin-bottom:3px}.tv{font-size:1.9rem;font-weight:900;color:var(--gold);font-family:'JetBrains Mono',monospace}
.qp-wrap{margin-bottom:14px}.qp-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(80px,1fr));gap:6px;margin-top:8px}
.qp-btn{padding:8px;font-size:.75rem;background:rgba(255,215,0,.06);border:1px solid rgba(255,215,0,.15);border-radius:6px;color:var(--gold);cursor:pointer}.qp-btn:hover{background:rgba(255,215,0,.14)}.qp-btn.max{background:linear-gradient(135deg,rgba(255,215,0,.15),rgba(255,215,0,.06))}
.gc{background:linear-gradient(135deg,rgba(0,122,255,.1),rgba(0,122,255,.03));border:1px solid rgba(0,122,255,.18);border-radius:var(--r);padding:18px;margin:14px 0}
.rcv{background:var(--card);border:1px solid var(--bdr);border-radius:16px;padding:24px}.rcv .icon{width:50px;height:50px;background:rgba(255,215,0,.1);border-radius:50%;margin:0 auto 10px;display:flex;align-items:center;justify-content:center;font-size:1.5rem}
@media(max-width:600px){.w{padding:10px}.card{padding:16px}}
/* ── END CSS ─────────────────────────────────────────────── */
</style>
</head>
<body>

<!-- OVERLAYS -->
<div class="ov" id="ov"><div class="sp"></div><div class="ov-t" id="ovT"></div><div class="ov-s" id="ovS"></div></div>
<div class="toast" id="toast"></div>

<div class="confirm-modal" id="confirmModal"><div class="confirm-box"><h3 id="confirmTitle"></h3><p id="confirmMsg"></p><div class="confirm-btns"><button class="btn-sm" id="confirmYes">Yes</button><button class="btn-sm btn-blue" onclick="closeConfirm()">Cancel</button></div></div></div>
<div class="detail-modal" id="detailModal"><div class="detail-box"><div style="display:flex;justify-content:space-between"><h2 id="detailTitle"></h2><button class="btn-sm btn-blue" onclick="closeDetail()">Close</button></div><div class="detail-grid" id="detailGrid"></div><div class="detail-actions" id="detailActions"></div></div></div>

<!-- PUBLIC PAGE -->
<div id="publicPage">
  <div class="w">
    <header>
      <div class="logo-img-wrap" id="logoImgWrap"><img id="logoImg" src="logo.png" alt="Logo"></div>
      <div class="logo" id="logoText">🎰 PISO<span>PALARO</span></div>
      <p class="tag" id="tagLine">Get lucky numbers — ₱1 entry!</p>
      <div class="pill" id="priceTag">₱1.00 PER ENTRY</div>
    </header>
    
    <!-- STOCK STATUS BAR -->
    <div class="conn checking" id="connBar"><div class="dot"></div><span id="connTxt">Connecting...</span></div>
    <div class="progress-wrap" style="margin:20px 0;">
      <div style="display:flex;justify-content:space-between;margin-bottom:6px;font-size:.7rem;color:var(--sub)">
        <span>Sold: <strong id="soldCount">0</strong></span>
        <span>Remaining: <strong id="remainCount">0</strong></span>
      </div>
      <div class="progress-track"><div class="progress-fill" id="progressFill" style="width:0%"></div></div>
    </div>

    <div class="card" id="secB">
      <div class="steps">
        <div class="stp on" id="i1"><span>1. Details</span></div>
        <div class="sln" id="l1"></div>
        <div class="stp" id="i2"><span>2. Payment</span></div>
        <div class="sln" id="l2"></div>
        <div class="stp" id="i3"><span>3. Done</span></div>
      </div>

      <!-- STEP 1 -->
      <div id="p1">
        <h3 style="margin-bottom:18px">📝 Entry Details</h3>
        <div style="display:grid;grid-template-columns:1fr 1fr;gap:12px">
          <div class="fg"><label>Full Name</label><input id="fN" placeholder="Juan Dela Cruz"></div>
          <div class="fg"><label>Phone (11 digits)</label><input id="fP" type="tel" placeholder="0917..."></div>
        </div>

        <div class="fg"><label id="qtyLabel">Quantity (Pool Size Dependent)</label>
          <input id="fQ" type="number" min="1" placeholder="Enter Amount">
          <div id="stockCheckMsg" style="font-size:.75rem;margin-top:4px;display:none;color:var(--err)"></div>
        </div>

        <div class="qp-grid">
          <button class="qp-btn" onclick="quickPick(10)">+10</button>
          <button class="qp-btn" onclick="quickPick(50)">+50</button>
          <button class="qp-btn" onclick="quickPick(100)">+100</button>
          <button class="qp-btn max" onclick="setMaxQty()">MAX (<span id="maxQtyDisp">0</span>)</button>
        </div>

        <div class="tot"><div class="tl">Total Price</div><div class="tv" id="dT">₱ 0.00</div></div>

        <!-- CONTINUE BUTTON (DISABLED IF INVALID) -->
        <button id="nextBtn" class="btn b1" onclick="goToPayment()" disabled>Continue →</button>
      </div>

      <!-- STEP 2 -->
      <div id="p2" class="hide">
        <h3>💳 Confirm Payment</h3>
        <div class="gc">
          <p><strong>Name:</strong> <span id="dN"></span></p>
          <p><strong>Number:</strong> <span class="mono" id="dP" onclick="copyGP()" style="color:var(--gc)"></span></p>
          <p><strong>Total:</strong> <strong id="dA" style="color:var(--gold)"></strong></p>
        </div>
        <div class="fg"><label>GCash Reference #</label><input id="fR" placeholder="Paste ref here" maxlength="13"></div>
        <div class="btn b1" id="buyBtn" onclick="submitEntry()">Confirm Entry</div>
        <button class="btn b2" onclick="goBack()">← Back</button>
      </div>

      <!-- STEP 3 -->
      <div id="p3" class="hide">
        <div class="rcv">
          <div class="icon">⏳</div>
          <h2 style="text-align:center">Pending Approval</h2>
          <p style="text-align:center;color:var(--sub);margin-bottom:20px">Save your details below.</p>
          
          <div class="fg"><label>TX ID</label><div style="background:#000;padding:8px;border-radius:6px;display:flex;justify-content:space-between">
            <span class="mono" id="rI"></span><span style="cursor:pointer;color:var(--gc)" onclick="copyField('rI')">Copy</span>
          </div></div>
          
          <div class="fg"><label>Your Numbers (<span id="rC">0</span>)</label>
            <div style="max-height:150px;overflow-y:auto;background:#000;padding:10px;border-radius:8px;font-family:monospace;" id="nList"></div>
          </div>
          
          <button class="btn b1" onclick="location.reload()">Buy Again</button>
        </div>
      </div>
    </div>
  </div>
</div>

<!-- ADMIN LOGIN -->
<div id="adminPage" style="display:none;min-height:100vh;padding:20px;text-align:center">
  <div class="card" style="max-width:400px;margin:50px auto">
    <h1>🔐 Admin Login</h1>
    <div class="fg"><input id="loginUser" placeholder="Username"></div>
    <div class="fg"><input id="loginPass" type="password" placeholder="Password"></div>
    <button class="btn b1" onclick="doLogin()">Sign In</button>
  </div>
</div>

<script>
// ── GLOBALS ───────────────────────────────────────────────────
const SCRIPT_URL='YOUR_SCRIPT_ID_HERE'; // REPLACE THIS WITH YOUR ACTUAL EXECUTABLE URL
let POOL_SIZE=200000, POOL_DIGITS=6;
let SETTINGS={price:1, min:100, max:10000};
let TOKEN='';
let myNumbers=[];

// ── HELPERS ───────────────────────────────────────────────────
const $ = id => document.getElementById(id);
const sleep = ms => new Promise(r => setTimeout(r, ms));

function toast(m, c) {
  const t = $('toast'); t.textContent=m; t.className=`toast ${c||''} on`;
  clearTimeout(t._t); t._t=setTimeout(()=>t.classList.remove('on'),3000);
}

// ── INIT ───────────────────────────────────────────────────
document.addEventListener('DOMContentLoaded', async () => {
  await loadPublicSettings();
  $('#dP').textContent = 'Loading...';
  updateUI();
});

async function loadPublicSettings() {
  try {
    const res = await safeFetch(SCRIPT_URL+'?action=publicSettings');
    if(res.success) {
      POOL_SIZE = parseInt(res.total_pool) || 200000;
      POOL_DIGITS = res.pool_digits || (POOL_SIZE >= 100000 ? 6 : 5);
      SETTINGS.price = res.price_per_number || 1;
      SETTINGS.min = res.min_quantity || 100;
      SETTINGS.max = res.max_quantity || 10000; // Cap max buy
      
      // Update Max for INPUT field
      $('fQ').max = POOL_SIZE; 
      $('maxQtyDisp').textContent = SETTINGS.max.toLocaleString();
      
      applySettingsUI(res);
      checkConnection();
    }
  } catch (e) {
    toast('Error loading config','err');
  }
}

function applySettingsUI(s) {
  $('dN').textContent = s.gcash_name || 'Admin';
  $('dP').textContent = s.gcash_number || '09170000000';
  $('tagLine').textContent = s.lottery_name || 'Piso Palaro';
  $('priceTag').textContent = '₱'+SETTINGS.price.toFixed(2);
  calcPrice();
  updateProgress();
}

// ── QUANTITY & STOCK CHECK ─────────────────────────────────
$('#fQ').addEventListener('input', function() {
  let v = parseInt(this.value) || 0;
  // Enforce Min
  if(v < SETTINGS.min) v = SETTINGS.min;
  // Enforce Max (Soft clamp)
  if(v > SETTINGS.max) v = SETTINGS.max; 
  // Enforce Pool Limit
  if(v > POOL_SIZE) {
     toast(`Max pool size is ${POOL_SIZE.toLocaleString()}`, 'err');
     this.value = POOL_SIZE;
     return;
  }
  
  // REAL-TIME STOCK CHECK (Pre-payment verification)
  if(v > 0) {
     checkRealTimeStock(v);
  }
  calcPrice();
  updateNextButtonState();
});

async function checkRealTimeStock(qty) {
  const msg = $('stockCheckMsg');
  try {
    // Poll stats frequently isn't good, but for UX on input, we do limited checks
    // Better: Debounce. For simplicity here:
    if(msg.style.display === 'block') return; // Already checked recently
    
    const res = await safeFetch(SCRIPT_URL+'?action=stats');
    if(!res.success) return;
    
    const avail = res.remaining;
    if(qty > avail) {
      msg.style.display = 'block';
      msg.textContent = `⚠️ Only ${avail.toLocaleString()} left!`;
      msg.style.color = 'var(--err)';
    } else {
      msg.style.display = 'none';
      msg.style.color = 'inherit';
    }
  } catch(e) {}
}

function updateNextButtonState() {
  const q = parseInt($('fQ').value) || 0;
  const n = $('nextBtn');
  const valid = $('fN').value.length >= 3 && $('fP').value.length === 11;
  const inRange = q >= SETTINGS.min && q <= SETTINGS.max && q <= POOL_SIZE;
  const stockOk = $('stockCheckMsg').style.display !== 'block';
  
  n.disabled = !(valid && inRange && stockOk);
}

function quickPick(n) {
  let cur = parseInt($('fQ').value) || 0;
  let next = cur + n;
  if(next > SETTINGS.max) next = SETTINGS.max;
  if(next > POOL_SIZE) next = POOL_SIZE;
  $('fQ').value = next;
  updateNextButtonState();
}

function setMaxQty() {
  $('fQ').value = SETTINGS.max;
  updateNextButtonState();
}

function calcPrice() {
  const q = parseInt($('fQ').value) || 0;
  $('dT').textContent = '₱ ' + (q * SETTINGS.price).toLocaleString(undefined, {maximumFractionDigits:2});
}

// ── NAVIGATION ───────────────────────────────────────────────
function goToPayment() {
  const nm = $('fN').value.trim();
  const ph = $('fP').value.replace(/\D/g,'');
  const qt = parseInt($('fQ').value);
  
  if(!nm || nm.length < 3) return toast('Enter valid name','err');
  if(ph.length !== 11 || !ph.startsWith('09')) return toast('Valid phone (09)...','err');
  if(parseInt($('stockCheckMsg').textContent)?.includes('Only')) return toast('Not enough stock!','err');
  
  hide('p1');show('p2');
  $('dA').textContent = formatCurrency(qt * SETTINGS.price);
  stp('on','ok');
}

function goBack() {
  hide('p2');show('p1');
  stp('on','stp','stp');
}

function stp(a,b,c) {
  $('#i1').className = a==='on'?'stp on':'stp ok';
  $('#i2').className = b==='on'?'stp on':'stp ok';
  $('#i3').className = c==='on'?'stp on':'stp ok';
}

// ── SUBMIT ───────────────────────────────────────────────────
function submitEntry() {
  const r = $('fR').value.trim();
  if(!r) return toast('Enter GCash ref','err');
  
  const nm = $('fN').value;
  const ph = $('fP').value;
  const qt = parseInt($('fQ').value);
  
  $('buyBtn').disabled=true;
  showOv('Reserving numbers...','Please wait');
  
  const params = new URLSearchParams({
    action:'purchase',
    name:nm, phone:ph, quantity:qt, gcashRef:r
  });
  
  safeFetch(SCRIPT_URL+'?'+params).then(async res => {
    hideOv();$('buyBtn').disabled=false;
    if(res.success) {
      myNumbers = res.numbers;
      showResult(res);
    } else {
      toast(res.error || 'Failed','err');
    }
  }).catch(() => { toast('Connection error','err'); });
}

function showResult(r) {
  hide('p2');show('p3');stp('ok','ok','on');
  $('rI').textContent = r.transactionId;
  $('rC').textContent = r.numbers.length;
  $('#nList').textContent = r.numbers.join('\n');
}

// ── UTILITY ───────────────────────────────────────────────────
function copyField(id) {
  const txt = $(id).textContent;
  navigator.clipboard.writeText(txt).then(()=>toast('Copied!'));
}
function copyGP(){ copyField('dP'); }
function formatCurrency(n) { return '₱ '+n.toLocaleString(undefined,{maximumFractionDigits:2}); }
function hide(i){document.getElementById(i).classList.add('hide')}
function show(i){document.getElementById(i).classList.remove('hide')}
function showOv(t,s){ 
  $('ovT').textContent=t; $('ovS').textContent=s; $('ov').classList.add('on') 
}
function hideOv(){$('ov').classList.remove('on')}

async function safeFetch(url,timeout=10000){
  const ctrl=new AbortController();
  const id=setTimeout(()=>ctrl.abort(),timeout);
  try{
    const r=await fetch(url,{signal:ctrl.signal});
    clearTimeout(id);
    const t=await r.text();
    return JSON.parse(t);
  }catch(e){clearTimeout(id);throw e;}
}

async function checkConnection() {
  try{
    const res = await safeFetch(SCRIPT_URL+'?action=health',3000);
    if(res.success){
      $('connBar').className='conn online';
      $('connTxt').textContent='✓ Connected';
      updateProgress();
    }
  }catch(e){
    $('connBar').className='conn offline';
    $('connTxt').textContent='✗ Offline';
  }
}

async function updateProgress() {
  try {
    const res = await safeFetch(SCRIPT_URL+'?action=stats');
    if(res.success) {
      const sold = res.sold;
      const rem = res.remaining;
      const pct = ((POOL_SIZE - rem)/POOL_SIZE)*100;
      $('soldCount').textContent = sold.toLocaleString();
      $('remainCount').textContent = rem.toLocaleString();
      $('progressFill').style.width = pct + '%';
    }
  } catch(e) {}
}
</script>
</body>
</html>
